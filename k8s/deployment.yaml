apiVersion: apps/v1
kind: Deployment
metadata:
  name: speakops-api
  namespace: default
  labels:
    app: speakops-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speakops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: speakops-api
    spec:
      containers:
        - name: speakops-api
          image: ghcr.io/YOUR_GITHUB_USERNAME/speakops-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: speakops-config
            - secretRef:
                name: speakops-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speakops-redis
  namespace: default
  labels:
    app: speakops-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speakops-redis
  template:
    metadata:
      labels:
        app: speakops-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: speakops-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"